name: Notify Discord

on:
  push:
    branches: [ "main" ]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Notificar Discord em caso de sucesso
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{"content":"Build OK no repositório!"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
